<article class="jewelry-product-card">
    <div class="jewelry-product-card__img-container">
        <img class="jewelry-product-card__img" src="@@image">
    </div>
    <div class="jewelry-product-card__text-body">
        <div class="jewelry-product-card__collection">@@collection</div>
        <div class="jewelry-product-card__title">@@title</div>
    </div>
    
</article>
