<div class="hover-details-item hover-details-item--product hover-details-item--product-wide">
    <div class="hover-details-item__panel">
        <p class="hover-details-item__eyebrow">@@category</p>
        <div class="hover-details-item__product-head">
            <h3 class="hover-details-item__title-text">@@title</h3>
            <p class="hover-details-item__detail">@@detail</p>
        </div>
        <p class="hover-details-item__description">@@description</p>
        <div class="hover-details-item__button-wrap">
            <button type="button" class="hover-details-item__cta primary-button primary-button--black-border">ПОДРОБНЕЕ</button>
        </div>
    </div>
</div>
