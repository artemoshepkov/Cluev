<article class="news-card">
    <a class="news-card__img-link" href="#">
        <img class="news-card__img" src="@@image">
    </a>
    <div class="news-card__content-container">
        <time class="news-card__date">@@date</time>
        <div class="news-card__title">@@title</div>
    </div>
    
</article>
