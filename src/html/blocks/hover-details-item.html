<div class="hover-details-item">
    <div class="hover-details-item__panel">
        <img class="hover-details-item__logo" src="@img/cluev/logo.svg" alt="CLUEV" width="120" height="40" loading="lazy">
        <div class="hover-details-item__contacts">
            <a class="hover-details-item__tel" href="tel:@@phoneHref">@@phone</a>
            <a class="hover-details-item__mail" href="mailto:@@email">@@email</a>
        </div>
        <div class="hover-details-item__button-wrap">
            <button type="button" class="hover-details-item__cta primary-button primary-button--black-border">ЗАКАЗАТЬ ЗВОНОК</button>
        </div>
    </div>
</div>
